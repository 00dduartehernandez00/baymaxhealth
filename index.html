<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baymax Health</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .card h3 { color: #333; margin-bottom: 15px; }
        .valor-grande { font-size: 3.5em; font-weight: bold; margin: 20px 0; }
        .spO2 { color: #4CAF50; }
        .temp { color: #FF9800; }
        .fc { color: #F44336; }
        .estado {
            padding: 10px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 10px;
        }
        .normal { background: #4CAF50; color: white; }
        .atencion { background: #FF9800; color: white; }
        .alerta { background: #F44336; color: white; }
        .grafica-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .grafica-container h3 { margin-bottom: 15px; color: #333; }
        .historial {
            background: white;
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #667eea; color: white; }
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .selector {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        select, button {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            font-size: 1em;
        }
        button {
            background: white;
            color: #667eea;
            cursor: pointer;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .valor-grande { font-size: 2.5em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Baymax Health</h1>
            <p>Monitoreo de signos vitales</p>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Cargando datos...</p>
        </div>
        
        <div id="dashboard" style="display: none;">
            <div class="selector">
                <span>📱 Dispositivo:</span>
                <select id="selector-dispositivo">
                    <option>Cargando...</option>
                </select>
                <button id="btn-refrescar">🔄 Actualizar</button>
            </div>
            
            <div class="dashboard">
                <div class="card">
                    <h3>🫁 SpO2</h3>
                    <div class="valor-grande spO2"><span id="spo2">--</span><span style="font-size:0.4em;">%</span></div>
                    <div id="estado-spo2" class="estado">--</div>
                </div>
                <div class="card">
                    <h3>🌡️ Temperatura</h3>
                    <div class="valor-grande temp"><span id="temp">--</span><span style="font-size:0.4em;">°C</span></div>
                    <div id="estado-temp" class="estado">--</div>
                </div>
                <div class="card">
                    <h3>❤️ FC</h3>
                    <div class="valor-grande fc"><span id="fc">--</span><span style="font-size:0.4em;">BPM</span></div>
                    <div id="estado-fc" class="estado">--</div>
                </div>
            </div>
            
            <div class="grafica-container">
                <h3>📈 SpO2</h3>
                <canvas id="grafica-spo2"></canvas>
            </div>
            
            <div class="grafica-container">
                <h3>📈 Temperatura</h3>
                <canvas id="grafica-temp"></canvas>
            </div>
            
            <div class="historial">
                <h3>📋 Historial</h3>
                <table>
                    <thead>
                        <tr><th>Fecha y Hora</th><th>SpO2</th><th>Temp</th><th>FC</th><th>Estado</th></tr>
                    </thead>
                    <tbody id="historial-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, query, orderByKey, limitToLast, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        
        const config = {
            apiKey: "AIzaSyCGb80jG5eF4bqr5YPAKMd2XEYrjhR9d5E",
            authDomain: "baymaxhealth.firebaseapp.com",
            databaseURL: "https://baymaxhealth-default-rtdb.firebaseio.com",
            projectId: "baymaxhealth",
            storageBucket: "baymaxhealth.firebasestorage.app",
            messagingSenderId: "785237598845",
            appId: "1:785237598845:web:9e986214441e6069a0c714"
        };
        
        const app = initializeApp(config);
        const db = getDatabase(app);
        
        let deviceId = null;
        let chart1, chart2;
        
        async function getDevices() {
            const snap = await get(ref(db, 'mediciones'));
            const sel = document.getElementById('selector-dispositivo');
            if (snap.exists()) {
                let devices = Object.keys(snap.val());
                sel.innerHTML = '<option value="">Seleccionar</option>';
                devices.forEach(d => {
                    let opt = document.createElement('option');
                    opt.value = d;
                    opt.textContent = d.slice(-8);
                    sel.appendChild(opt);
                });
                if (devices.length) {
                    deviceId = devices[0];
                    sel.value = deviceId;
                    loadData();
                }
            }
        }
        
        function loadData() {
            if (!deviceId) return;
            const q = query(ref(db, `mediciones/${deviceId}`), orderByKey(), limitToLast(20));
            onValue(q, (snap) => {
                if (snap.exists()) {
                    let data = snap.val();
                    let list = Object.entries(data).map(([k,v]) => ({...v, ts: v.timestamp || parseInt(k)}))
                        .sort((a,b) => a.ts - b.ts);
                    updateUI(list);
                }
            });
        }
        
        function updateUI(list) {
            if (!list.length) return;
            let last = list[list.length-1];
            document.getElementById('spo2').innerText = last.spo2 || '--';
            document.getElementById('temp').innerText = last.temperatura?.toFixed(1) || '--';
            document.getElementById('fc').innerText = last.fc || '--';
            
            let s = document.getElementById('estado-spo2');
            if (last.spo2 >= 95) { s.innerText = '✅ NORMAL'; s.className = 'estado normal'; }
            else if (last.spo2 >= 90) { s.innerText = '⚠️ ATENCIÓN'; s.className = 'estado atencion'; }
            else { s.innerText = '🚨 ALERTA'; s.className = 'estado alerta'; }
            
            // Usar fecha_hora para las gráficas
            let labels = list.map(m => {
                if (m.fecha_hora) {
                    return m.fecha_hora.substring(5, 16); // Muestra "03-25 15:30"
                } else {
                    return new Date(m.ts).toLocaleTimeString();
                }
            });
            
            let spo2s = list.map(m => m.spo2);
            let temps = list.map(m => m.temperatura);
            
            if (!chart1) {
                chart1 = new Chart(document.getElementById('grafica-spo2'), {
                    type: 'line',
                    data: { labels: labels, datasets: [{ label: 'SpO2 %', data: spo2s, borderColor: '#4CAF50' }] }
                });
                chart2 = new Chart(document.getElementById('grafica-temp'), {
                    type: 'line',
                    data: { labels: labels, datasets: [{ label: 'Temp °C', data: temps, borderColor: '#FF9800' }] }
                });
            } else {
                chart1.data.labels = labels;
                chart1.data.datasets[0].data = spo2s;
                chart1.update();
                chart2.data.labels = labels;
                chart2.data.datasets[0].data = temps;
                chart2.update();
            }
            
            let tbody = document.getElementById('historial-body');
            tbody.innerHTML = '';
            list.slice().reverse().forEach(m => {
                let r = tbody.insertRow();
                // 🔥 USAR fecha_hora si existe
                if (m.fecha_hora) {
                    r.insertCell(0).innerText = m.fecha_hora;
                } else {
                    r.insertCell(0).innerText = new Date(m.ts).toLocaleString();
                }
                r.insertCell(1).innerText = m.spo2 + '%';
                r.insertCell(2).innerText = (m.temperatura?.toFixed(1)||'--') + '°C';
                r.insertCell(3).innerText = m.fc + ' BPM';
                r.insertCell(4).innerHTML = m.alerta ? '🚨 ALERTA' : '✅ NORMAL';
            });
        }
        
        document.getElementById('selector-dispositivo').onchange = (e) => {
            deviceId = e.target.value;
            if (deviceId) loadData();
        };
        document.getElementById('btn-refrescar').onclick = () => { if (deviceId) loadData(); else getDevices(); };
        
        getDevices().then(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            setInterval(() => { if (deviceId) loadData(); }, 10000);
        });
    </script>
</body>
</html>
